<!-- add-business-type.component.html -->
<div class="card">
  <div class="card-header">
    {{ categoryForEdit == null ? 'Add Category' : 'Edit Category' }}
  </div>
  <div class="card-body">
    <div class="mb-3">
      <label for="description" class="form-label">Name</label>
      <input type="text" class="form-control" id="description" [(ngModel)]="description"
        placeholder="Enter Category Name">
    </div>
    <div class="mb-3">
      <label for="description" class="form-label">Ebay Categry Id</label>
      <input type="text" class="form-control" id="description" [(ngModel)]="EbayCategryId"
        placeholder="Enter Category Name">
    </div>
    <label class="form-label d-block">Businesses</label>

    <select class="form-control" [(ngModel)]="selectedBusinessId">
      <option *ngFor="let one of Businesses"  [value]="one.business_id">{{ one.business_name }}
      </option>
    </select>
    <br/>
    <button [disabled]="loading" class="btn btn-primary" (click)="addCategory()">
      {{ categoryForEdit == null ? 'Add' : 'Edit' }}
    </button>
    <div *ngIf="message" class="mt-3 alert alert-info">{{ message }}</div>
  </div>
</div>
